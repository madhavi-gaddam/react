<!DOCTYPE html>
<html>
<head>
  <title>Event Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h2>Event Manager</h2>

    <section class="input-section">
      <div class="input-row">
        <input id="eventInput" placeholder="Enter event name">
        <button class="add-btn" onclick="addEvent()">Add Event</button>
      </div>
      <p id="message"></p>
    </section>

    <!-- Separate scrollable area for all event cards -->
    <section class="events-section">
      <div class="events-header">
        <h3>Scheduled Events</h3>
        <span id="eventCounter">Total Events: 0</span>
      </div>
      <p id="emptyState">No events scheduled yet. Add your first event!</p>
      <ul id="eventList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
